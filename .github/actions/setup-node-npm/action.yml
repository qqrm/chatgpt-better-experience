name: Setup Node and install npm dependencies

description: Sets up Node.js 20 with npm cache and installs dependencies via npm ci.

runs:
  using: composite
  steps:
    - name: Setup Node.js 20
      uses: actions/setup-node@v6.2.0
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      shell: bash
      env:
        HUSKY: 0
      run: npm ci
