name: Supply Chain

on:
  push:
    branches:
      - main
    paths-ignore:
      - config/extension/manifest.base.json
  workflow_dispatch: {}

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  sbom-and-provenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node and install dependencies
        uses: ./.github/actions/setup-node-npm

      - name: Build extension assets
        run: npm run build

      - name: Build package (AMO)
        run: npm run build:amo

      - name: Verify packaged artifact exists
        shell: bash
        run: |
          set -euo pipefail
          ls -1 web-ext-artifacts/*.zip

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: cyclonedx-sbom

      - name: Upload AMO package artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: amo-package
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: web-ext-artifacts/*.zip
