name: update-readme-dark-screenshot

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force screenshot refresh even if no UI files changed"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-screenshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect whether screenshot needs refresh
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_update || false }}
        shell: bash
        run: |
          set -euo pipefail

          # 1) Manual run: allow hard force.
          if [ "${FORCE_UPDATE}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2) If screenshot is missing, we must generate it (initialization).
          if [ ! -f "docs/images/popup-dark.jpeg" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3) On push, regenerate only when UI files changed.
          BASE=""
          if [ "${EVENT}" = "push" ] && [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BASE="${BEFORE}"
            fi
          fi

          if [ -z "${BASE}" ]; then
            git fetch --no-tags --prune --depth=200 origin main || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              BASE="$(git merge-base HEAD origin/main)"
            else
              BASE="HEAD~1"
            fi
          fi

          if git diff --name-only "${BASE}" HEAD -- \
            popup.html \
            popup.ts \
            src/application/popupUseCases.ts \
            | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when nothing to update
        if: steps.changes.outputs.changed != 'true'
        run: echo "Popup UI unchanged and screenshot exists. Nothing to update."

      - name: Use Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        env:
          HUSKY: 0
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.changes.outputs.changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build extension
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Regenerate dark-theme screenshot and sync README
        if: steps.changes.outputs.changed == 'true'
        run: node .github/scripts/update-readme-screenshot.mjs

      - name: Assert screenshot + README updated
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/images/popup-dark.jpeg
          test -s docs/images/popup-dark.jpeg
          grep -n "docs/images/popup-dark.jpeg" README.md >/dev/null
          git status --porcelain

      - name: Create PR with screenshot update
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: refresh dark-theme popup screenshot"
          branch: "ci/update-readme-dark-screenshot"
          delete-branch: true
          title: "docs: refresh dark-theme popup screenshot"
          body: |
            Automated update of the dark-theme popup screenshot and README preview block.
          add-paths: |
            docs/images/popup-dark.jpeg
            README.md
          enable-automerge: true
          merge-method: squash
