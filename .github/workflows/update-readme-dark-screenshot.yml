name: Update README Dark Screenshot

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - docs/**
  workflow_dispatch:
    inputs:
      force_update:
        description: "Force screenshot refresh even if no UI files changed"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-screenshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Detect whether screenshot needs refresh
        id: changes
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          FORCE_UPDATE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_update || false }}
        shell: bash
        run: |
          set -euo pipefail

          # 1) Manual run: allow hard force.
          if [ "${FORCE_UPDATE}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2) If screenshot is missing, we must generate it (initialization).
          if [ ! -f "docs/images/popup-dark.jpeg" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3) On push, regenerate only when UI files changed.
          BASE=""
          if [ "${EVENT}" = "push" ] && [ -n "${BEFORE}" ] && [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              BASE="${BEFORE}"
            fi
          fi

          if [ -z "${BASE}" ]; then
            git fetch --no-tags --prune --depth=200 origin main || true
            if git show-ref --verify --quiet refs/remotes/origin/main; then
              BASE="$(git merge-base HEAD origin/main)"
            else
              BASE="HEAD~1"
            fi
          fi

          if git diff --name-only "${BASE}" HEAD -- \
            popup.html \
            popup.ts \
            src/application/popupUseCases.ts \
            | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when nothing to update
        if: steps.changes.outputs.changed != 'true'
        run: echo "Popup UI unchanged and screenshot exists. Nothing to update."

      - name: Setup Node and install dependencies
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/setup-node-npm

      - name: Cache Playwright browsers
        if: steps.changes.outputs.changed == 'true'
        id: playwright-cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright system dependencies
        if: steps.changes.outputs.changed == 'true' && runner.os == 'Linux'
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.changes.outputs.changed == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Build extension
        if: steps.changes.outputs.changed == 'true'
        run: npm run build

      - name: Regenerate dark-theme screenshot and sync README
        if: steps.changes.outputs.changed == 'true'
        run: node .github/scripts/update-readme-screenshot.mjs

      - name: Assert screenshot + README updated
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -f docs/images/popup-dark.jpeg
          test -s docs/images/popup-dark.jpeg
          grep -n "docs/images/popup-dark.jpeg" README.md >/dev/null
          git status --porcelain

      - name: Create PR with screenshot update
        id: create_pr
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.AUTOMATION_BOT_TOKEN }}
          commit-message: "docs: refresh dark-theme popup screenshot"
          branch: "ci/update-readme-dark-screenshot"
          delete-branch: true
          title: "docs: refresh dark-theme popup screenshot"
          body: |
            Automated update of the dark-theme popup screenshot and README preview block.
          labels: |
            automation/screenshot
          add-paths: |
            docs/images/popup-dark.jpeg
            README.md
          enable-automerge: true
          merge-method: squash

      - name: Validate repository auto-merge setting
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_BOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          allow_auto_merge="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.allow_auto_merge')"
          if [ "${allow_auto_merge}" != "true" ]; then
            echo "Repository setting 'Allow auto-merge' is disabled. Enable it in Settings > General > Pull Requests."
            exit 1
          fi

      - name: Close stale screenshot PRs
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_BOT_TOKEN }}
          CURRENT_PR: ${{ steps.create_pr.outputs.pull-request-number }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --base main \
            --label automation/screenshot \
            --json number \
            --jq '.[] | select((.number|tostring) != env.CURRENT_PR) | .number' \
          | while read -r stale_pr; do
              if [ -n "${stale_pr}" ]; then
                gh pr close "${stale_pr}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --comment "Superseded by #${CURRENT_PR}. Keeping only the latest screenshot refresh PR."
              fi
            done

      - name: Enforce auto-merge (with merge-now fallback)
        if: steps.changes.outputs.changed == 'true' && steps.create_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_BOT_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --auto

          state="$(gh pr view "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --json state --jq '.state')"
          merge_state="$(gh pr view "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --json mergeStateStatus --jq '.mergeStateStatus')"

          if [ "${state}" != "MERGED" ] && [ "${merge_state}" = "CLEAN" ]; then
            gh pr merge "${PR_NUMBER}" \
              --repo "${GITHUB_REPOSITORY}" \
              --squash \
              --delete-branch
          fi
