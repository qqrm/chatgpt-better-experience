name: dependabot-auto-merge

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge for Dependabot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            try {
              await github.graphql(
                `mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: SQUASH}) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }`,
                {
                  pullRequestId: context.payload.pull_request.node_id,
                }
              );
              core.info(`Auto-merge enabled for #${pull_number}`);
            } catch (error) {
              core.warning(`Could not enable auto-merge for #${pull_number}: ${error.message}`);

              const pull = await github.rest.pulls.get({ owner, repo, pull_number });
              if (pull.data.auto_merge) {
                core.info(`Auto-merge is already enabled for #${pull_number}`);
                return;
              }

              throw error;
            }
