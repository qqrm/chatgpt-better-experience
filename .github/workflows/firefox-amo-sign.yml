name: firefox-amo-sign

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch: {}

jobs:
  sign-and-submit:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.sha }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build extension assets
        run: npm run build

      - name: Lint (AMO)
        run: npm run lint:amo

      - name: Build package (AMO)
        run: npm run build:amo

      - name: Sign and submit to AMO (listed)
        env:
          AMO_API_KEY: ${{ secrets.JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.JWT_SECRET }}
        run: npx web-ext@9.3.0 sign --source-dir dist --artifacts-dir web-ext-artifacts --api-key "$AMO_API_KEY" --api-secret "$AMO_API_SECRET" --channel listed --amo-metadata amo-metadata.json --timeout 900000

      - name: Upload signed XPI artifact
        uses: actions/upload-artifact@v6
        with:
          name: signed-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
