name: Firefox AMO Sign

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - docs/**
      - config/extension/manifest.base.json
  workflow_dispatch: {}

concurrency:
  group: firefox-amo-sign-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-version:
    # Skip the rerun caused by our own auto-bump commit to avoid duplicate AMO submissions.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[amo-auto-bump]') }}

    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_sha: ${{ steps.finalize.outputs.release_sha }}
      release_version: ${{ steps.finalize.outputs.release_version }}
      bumped: ${{ steps.finalize.outputs.bumped }}
      checkout_ref: ${{ steps.finalize.outputs.checkout_ref }}
      bump_branch: ${{ steps.finalize.outputs.bump_branch }}
      bump_pr_url: ${{ steps.finalize.outputs.bump_pr_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 2
          token: ${{ secrets.AUTOMATION_BOT_TOKEN }}

      - name: Ensure manifest version bumped on main merge
        id: ensure-version
        shell: bash
        run: |
          set -euo pipefail

          manifest_path="config/extension/manifest.base.json"
          if [[ ! -f "$manifest_path" ]]; then
            echo "::error::$manifest_path not found"
            exit 1
          fi

          release_version="$(node scripts/manifest-version.mjs print "$manifest_path")"
          release_sha="$(git rev-parse HEAD)"
          bumped="false"

          if git rev-parse --verify HEAD^ >/dev/null 2>&1 && git cat-file -e HEAD^:"$manifest_path" >/dev/null 2>&1; then
            prev_manifest="$(mktemp)"
            git show HEAD^:"$manifest_path" > "$prev_manifest"
            prev_version="$(node scripts/manifest-version.mjs print "$prev_manifest")"
            rm -f "$prev_manifest"

            if [[ "$release_version" == "$prev_version" ]]; then
              echo "$manifest_path version unchanged on main push; auto-bumping patch version"
              release_version="$(node scripts/manifest-version.mjs bump-patch "$manifest_path")"

              bumped="true"
            fi
          fi

          {
            echo "release_sha=$release_sha"
            echo "release_version=$release_version"
            echo "bumped=$bumped"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update AMO auto-bump PR
        id: create_pr
        if: steps.ensure-version.outputs.bumped == 'true'
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ secrets.AUTOMATION_BOT_TOKEN }}
          branch: ci/amo-auto-bump
          delete-branch: true
          base: main
          add-paths: |
            config/extension/manifest.base.json
          title: "[amo-auto-bump] chore(version): bump manifest to ${{ steps.ensure-version.outputs.release_version }}"
          commit-message: "chore(version): bump manifest to ${{ steps.ensure-version.outputs.release_version }} [amo-auto-bump]"
          body: |
            Automated patch bump for AMO release.

            - Release version: `${{ steps.ensure-version.outputs.release_version }}`
            - Workflow run id: `${{ github.run_id }}`
          labels: |
            automation/amo
          enable-automerge: true
          merge-method: squash

      - name: Validate repository auto-merge setting
        if: steps.create_pr.outputs.pull-request-operation == 'created' || steps.create_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_BOT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          allow_auto_merge="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.allow_auto_merge')"
          if [ "${allow_auto_merge}" != "true" ]; then
            echo "Repository setting 'Allow auto-merge' is disabled. Enable it in Settings > General > Pull Requests."
            exit 1
          fi

      - name: Enforce auto-merge (with merge-now fallback)
        if: steps.create_pr.outputs.pull-request-operation == 'created' || steps.create_pr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_BOT_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        shell: bash
        run: |
          set -euo pipefail

          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --auto

          state="$(gh pr view "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --json state --jq '.state')"
          merge_state="$(gh pr view "${PR_NUMBER}" --repo "${GITHUB_REPOSITORY}" --json mergeStateStatus --jq '.mergeStateStatus')"

          if [ "${state}" != "MERGED" ] && [ "${merge_state}" = "CLEAN" ]; then
            gh pr merge "${PR_NUMBER}" \
              --repo "${GITHUB_REPOSITORY}" \
              --squash \
              --delete-branch
          fi

      - name: Finalize prepare-version outputs
        id: finalize
        shell: bash
        run: |
          set -euo pipefail

          release_sha="${{ steps.ensure-version.outputs.release_sha }}"
          release_version="${{ steps.ensure-version.outputs.release_version }}"
          bumped="${{ steps.ensure-version.outputs.bumped }}"
          checkout_ref="$release_sha"
          bump_branch=""
          bump_pr_url=""

          if [ "${bumped}" = "true" ]; then
            checkout_ref="ci/amo-auto-bump"
            bump_branch="ci/amo-auto-bump"
            bump_pr_url="${{ steps.create_pr.outputs.pull-request-url }}"
          fi

          {
            echo "release_sha=$release_sha"
            echo "release_version=$release_version"
            echo "bumped=$bumped"
            echo "checkout_ref=$checkout_ref"
            echo "bump_branch=$bump_branch"
            echo "bump_pr_url=$bump_pr_url"
          } >> "$GITHUB_OUTPUT"

  sign-and-submit:
    if: ${{ needs.prepare-version.result == 'success' && needs.prepare-version.outputs.checkout_ref != '' }}
    needs: prepare-version
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare-version.outputs.checkout_ref }}
          token: ${{ secrets.AUTOMATION_BOT_TOKEN }}

      - name: Log release target
        run: |
          echo "release_sha=${{ needs.prepare-version.outputs.release_sha }}"
          echo "release_version=${{ needs.prepare-version.outputs.release_version }}"
          echo "bumped=${{ needs.prepare-version.outputs.bumped }}"
          echo "checkout_ref=${{ needs.prepare-version.outputs.checkout_ref }}"
          echo "bump_branch=${{ needs.prepare-version.outputs.bump_branch }}"
          echo "bump_pr_url=${{ needs.prepare-version.outputs.bump_pr_url }}"

      - name: Setup Node and install dependencies
        uses: ./.github/actions/setup-node-npm

      - name: Build extension assets
        run: npm run build

      - name: Lint (AMO)
        run: npm run lint:amo

      - name: Build package (AMO)
        run: npm run build:amo

      - name: Sign and submit to AMO (listed)
        env:
          AMO_API_KEY: ${{ secrets.JWT_ISSUER }}
          AMO_API_SECRET: ${{ secrets.JWT_SECRET }}
        run: npx web-ext@9.3.0 sign --source-dir dist --artifacts-dir web-ext-artifacts --api-key "$AMO_API_KEY" --api-secret "$AMO_API_SECRET" --channel listed --amo-metadata config/extension/amo-metadata.json --timeout 900000

      - name: Upload signed XPI artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: signed-xpi
          path: web-ext-artifacts/*.xpi
          if-no-files-found: error
          retention-days: 7
