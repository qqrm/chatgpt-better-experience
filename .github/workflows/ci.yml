name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: npm ci

      - name: Format check
        run: npm run verify -- --step format:check

      - name: Lint
        run: npm run verify -- --step lint

      - name: Typecheck
        run: npm run verify -- --step typecheck

      - name: Build
        run: npm run verify -- --step build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
