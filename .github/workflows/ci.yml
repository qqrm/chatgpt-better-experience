name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect code-relevant changes
        id: changes
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'content.ts'
              - 'popup.ts'
              - 'popup.html'
              - 'settings.ts'
              - 'scripts/**'
              - 'manifest.json'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest.config.*'
              - 'eslint.config.*'
              - '.github/workflows/ci.yml'
              - '.github/workflows/firefox-amo-sign.yml'
              - '.github/workflows/update-icons.yml'
              - '.github/workflows/update-readme-dark-screenshot.yml'
              - '.github/actions/setup-node-npm/**'
            docs_only:
              - 'README.md'
              - 'docs/**'
              - 'docs/images/**'

      - name: Skip heavy CI for docs/image-only changes
        if: steps.changes.outputs.code != 'true'
        run: echo "docs/image-only change; skipping heavy CI"

      - name: Setup Node and install dependencies
        if: steps.changes.outputs.code == 'true'
        uses: ./.github/actions/setup-node-npm

      - name: Verify CI
        if: steps.changes.outputs.code == 'true'
        run: npm run verify:ci

      - name: Upload build artifact
        if: steps.changes.outputs.code == 'true' && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v6
        with:
          name: extension-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
