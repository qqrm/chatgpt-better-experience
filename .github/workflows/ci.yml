name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - config/extension/manifest.base.json
  pull_request:
  workflow_dispatch: {}
  schedule:
    - cron: "32 3 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect code-relevant changes
        id: changes
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            heavy:
              - 'src/**'
              - 'tests/**'
              - 'config/extension/amo-metadata.json'
              - 'config/tooling/**'
              - 'icons/**'
              - 'icons-src/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest.config.*'
              - 'eslint.config.*'
              - '.github/workflows/**'
              - '.github/actions/**'
            manifest_bump:
              - 'config/extension/manifest.base.json'
      - name: Fast-path success for manifest-only bump
        if: steps.changes.outputs.heavy != 'true' && steps.changes.outputs.manifest_bump == 'true'
        run: |
          echo "Manifest-only version bump detected."
          echo "Intentionally succeeding quickly to publish required check context 'build'."
          echo "Skipping npm verify:ci for manifest bump PR."

      - name: Skip heavy CI when not needed
        if: steps.changes.outputs.heavy != 'true' && steps.changes.outputs.manifest_bump != 'true'
        run: |
          echo "No heavy changes detected (src/tests/tooling/workflows/packaging)."
          echo "This job exists to satisfy required check context 'build' on protected main."
          echo "Skipping npm verify:ci for docs-only changes."

      - name: Setup Node and install dependencies
        if: steps.changes.outputs.heavy == 'true'
        uses: ./.github/actions/setup-node-npm

      - name: Verify CI
        if: steps.changes.outputs.heavy == 'true'
        run: npm run verify:ci

      - name: Upload build artifact
        if: steps.changes.outputs.heavy == 'true' && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v6.0.0
        with:
          name: extension-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  codeql:
    name: CodeQL
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  supply-chain:
    name: Supply Chain
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      attestations: write
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node and install dependencies
        uses: ./.github/actions/setup-node-npm

      - name: Build extension assets
        run: npm run build

      - name: Build package (AMO)
        run: npm run build:amo

      - name: Verify packaged artifact exists
        shell: bash
        run: |
          set -euo pipefail
          ls -1 web-ext-artifacts/*.zip

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          upload-artifact: true
          artifact-name: cyclonedx-sbom

      - name: Upload AMO package artifact
        uses: actions/upload-artifact@v6.0.0
        with:
          name: amo-package
          path: web-ext-artifacts/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: web-ext-artifacts/*.zip
