name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect code-relevant changes
        id: changes
        uses: dorny/paths-filter@v3.0.2
        with:
          filters: |
            heavy:
              - 'src/**'
              - 'tests/**'
              - 'config/extension/**'
              - 'config/tooling/**'
              - 'icons/**'
              - 'icons-src/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'vitest.config.*'
              - 'eslint.config.*'
              - '.github/workflows/**'
              - '.github/actions/**'
      - name: Skip heavy CI when not needed
        if: steps.changes.outputs.heavy != 'true'
        run: |
          echo "No heavy changes detected (src/tests/tooling/workflows/packaging)."
          echo "This job exists to satisfy required check context 'build' on protected main."
          echo "Skipping npm verify:ci for docs-only changes."

      - name: Setup Node and install dependencies
        if: steps.changes.outputs.heavy == 'true'
        uses: ./.github/actions/setup-node-npm

      - name: Verify CI
        if: steps.changes.outputs.heavy == 'true'
        run: npm run verify:ci

      - name: Upload build artifact
        if: steps.changes.outputs.heavy == 'true' && hashFiles('dist/**') != ''
        uses: actions/upload-artifact@v6.0.0
        with:
          name: extension-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
