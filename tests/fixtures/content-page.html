<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT Dictation Test Fixture</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 24px;
      }

      button {
        font-size: 16px;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <label>
        <input id="temporary-chat-checkbox" type="checkbox" />
        <h1 data-testid="temporary-chat-label">Temporary Chat</h1>
      </label>
    </main>
    <script>
      const tempChatCheckbox = document.getElementById("temporary-chat-checkbox");

      tempChatCheckbox.addEventListener("change", () => {
        document.body.dataset.tempChat = tempChatCheckbox.checked ? "enabled" : "disabled";
      });
    </script>
  </body>
</html>
