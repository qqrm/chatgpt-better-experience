<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Codex Task Fixture</title>
  </head>
  <body>
    <div class="task-view">
      <div class="task-composer">
        <div class="task-actions">
          <div class="task-actions-left">
            <button data-testid="dictation-button" role="button" aria-label="Dictation">
              Dictation
            </button>
          </div>
          <div class="task-actions-right">
            <div class="dictation-actions">
              <button data-testid="codex-submit" role="button" aria-label="Submit">✓</button>
            </div>
          </div>
        </div>
        <form class="task-send">
          <button type="submit" role="button" aria-label="Submit">Send</button>
        </form>
      </div>
    </div>
  </body>
</html>
