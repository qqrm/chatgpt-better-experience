<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Codex Root Fixture</title>
  </head>
  <body>
    <div id="codex-root">
      <div class="composer">
        <div class="composer-actions" data-testid="composer-footer-actions">
          <button data-testid="dictation-button" aria-label="Dictate button">Dictate</button>
          <button data-testid="codex-submit" aria-label="Submit" role="button">Submit</button>
        </div>
        <form class="composer-send">
          <button type="submit" aria-label="Submit">Send</button>
        </form>
      </div>
    </div>
  </body>
</html>
